name: Update Rosters

on:
  schedule:
    # 7:00 AM EDT / 6:00 AM EST
    - cron: "0 11 * * *"
  workflow_dispatch:

jobs:
  update-rosters:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Skip outside season
        run: |
          month=$(date -u +%m)
          case "$month" in
            10|11|12|01|02|03|04|05|06) echo "In season window." ;;
            *) echo "Outside season window. Skipping."; exit 0 ;;
          esac
      - name: Build rosters
        run: |
          set -euo pipefail
          timeout 120s python3 scripts/build_rosters.py
      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/rosters.json
          git commit -m "Update rosters"
          git push
